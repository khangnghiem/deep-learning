experiment:
  name: polyp_segmentation_pvt
  description: High-accuracy polyp segmentation using Polyp-PVT
data:
  silver: "medical.polyp_silver"
  gold:
    transform: gold.segmentation_gold
    resolution: [352, 352]
    train_split: 0.8
    val_split: 0.2
  sources:
  - name: kvasir-seg
  - name: cvc-clinicdb
model:
  architecture: polyp_pvt
  pretrained: true
  num_classes: 1
training:
  epochs: 100
  learning_rate: 1e-4
  optimizer: adamw
  loss: structure_loss
mlflow:
  experiment_name: polyp-segmentation
  run_name: polyp_pvt_baseline
evaluation:
  target_dice: 0.94
  target_iou: 0.85
edge_deployment:
  target_fps: 50
  format: tensorrt
  precision: fp16
