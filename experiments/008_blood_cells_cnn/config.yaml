experiment:
  name: 008_blood_cells_cnn
  description: 'Blood cell classification: EOSINOPHIL, LYMPHOCYTE, MONOCYTE, NEUTROPHIL'
data:
  dataset: blood-cells
  layer: silver
  image_size: 224
  batch_size: 32
  num_workers: 4
  silver: null
  gold:
    transform: gold.classification_gold
  sources:
  - name: blood-cells
model:
  architecture: resnet18
  pretrained: true
  num_classes: 4
  in_channels: 3
training:
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: adam
  scheduler: cosine
  early_stopping_patience: 10
mlflow:
  experiment_name: blood-cells-resnet
  run_name: null
paths:
  data_dir: null
  output_dir: null
