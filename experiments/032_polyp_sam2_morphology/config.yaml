experiment:
  name: 032_polyp_sam2_morphology
  description: Hybrid YOLOv12x (TTA) + SAM2 with Morphological Post-Processing

data:
  dataset: polyp
  dataset_yaml: /content/drive/MyDrive/data_lake/03_gold/016_polyp_fast_diag_dataset/dataset.yaml
  test_images_dir: /content/drive/MyDrive/data_lake/03_gold/016_polyp_fast_diag_dataset/test/images
  test_labels_dir: /content/drive/MyDrive/data_lake/03_gold/016_polyp_fast_diag_dataset/test/labels

model:
  yolo_weights: /content/drive/MyDrive/models/trained/025_polyp_yolov12x_aug/train/weights/best.pt
  sam_weights: sam2_b.pt # Ultralytics automatically downloads SAM2-base if needed

evaluation:
  conf_threshold: 0.25 # minimum YOLO confidence to pass boxes to SAM2
  iou_threshold: 0.45 # for NMS if needed

mlflow:
  experiment_name: polyp-sam2-morphology
  run_name: null

paths:
  output_dir: /content/drive/MyDrive/models/trained/032_polyp_sam2_morphology
