experiment:
  name: polyp_detection
  description: Colonoscopy polyp detection with YOLOv8 fine-tuning
data:
  datasets:
  - kvasir_seg
  - cvc_clinic
  custom_polyps: data_lake/00_landing/polyp
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  img_size: 640
  batch_size: 16
  annotation_format: coco
  coco_json: data_lake/02_silver/polyp_coco/polyp_yolo_annotations.json
  coco_to_yolo_script: repos/data-ingestion/scripts/coco_to_yolo_seg.py
model:
  architecture: yolov8m
  pretrained: true
  num_classes: 1
  confidence_threshold: 0.25
training:
  epochs: 80
  learning_rate: 0.001
  optimizer: auto
  patience: 15
  augmentation:
    hsv_h: 0.015
    hsv_s: 0.5
    hsv_v: 0.3
    degrees: 15.0
    translate: 0.1
    scale: 0.5
    fliplr: 0.5
    flipud: 0.3
    mosaic: 1.0
    mixup: 0.1
mlflow:
  experiment_name: polyp-detection
  run_name: null
evaluation:
  target_recall: 0.9
  target_map50: 0.7
  iou_threshold: 0.5
  merge_iou_threshold: 0.3
