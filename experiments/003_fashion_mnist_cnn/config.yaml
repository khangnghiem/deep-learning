# 003_fashion_mnist_cnn

experiment:
  name: "003_fashion_mnist_cnn"
  description: "Fashion-MNIST classification (clothing items)"

data:
  dataset: "fashion_mnist"
  batch_size: 64
  num_workers: 4

model:
  architecture: "simple_cnn"
  pretrained: false
  num_classes: 10

training:
  epochs: 15
  learning_rate: 0.001
  optimizer: "adam"

mlflow:
  experiment_name: "fashion-mnist-cnn"
  run_name: null
