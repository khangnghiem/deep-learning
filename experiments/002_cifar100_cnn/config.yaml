experiment:
  name: 002_cifar100_cnn
  description: CIFAR-100 classification with CNN (100 classes)
data:
  dataset: cifar100
  batch_size: 64
  num_workers: 4
  silver: null
  gold:
    transform: gold.classification_gold
  sources:
  - name: cifar100
model:
  architecture: simple_cnn
  pretrained: true
  num_classes: 100
training:
  epochs: 30
  learning_rate: 0.001
  optimizer: adam
  scheduler: cosine
  early_stopping_patience: 10
mlflow:
  experiment_name: cifar100-cnn
  run_name: null
paths:
  data_dir: null
  output_dir: null
