# Experiment Configuration

experiment:
  name: "experiment_name"
  description: "Brief description"

data:
  dataset: "dataset_name"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  batch_size: 32
  num_workers: 4

model:
  architecture: "resnet18"
  pretrained: true
  num_classes: 10

training:
  epochs: 50
  learning_rate: 0.001
  optimizer: "adam"         # adam | sgd | adamw
  scheduler: "cosine"       # cosine | step | null
  early_stopping_patience: 10  # null to disable
  seed: 42                  # null for non-deterministic

mlflow:
  experiment_name: "deep-learning"
  run_name: null  # Auto-generated if null

paths:
  # These will be overridden by config/paths.py
  data_dir: null
  output_dir: null
